[general]
name = "aiter-flash-attn-ck"
license = "MIT"
version = 1
backends = [
    "rocm",
]

[general.hub]
repo-id = "kernels-community/aiter-flash-attn-ck"

[torch]
src = [
    "torch-ext/torch_binding.cpp",
    "torch-ext/torch_binding.h",
]

[kernel.aiter_flash_attn_ck]
backend = "rocm"
rocm-archs = [
    "gfx942",
    "gfx950",
]
depends = [
    "torch",
]
include = [
    "aiter/include",
    "ck/include",
    "ck/fmha",
]
cxx-flags = [
    "-DENABLE_CK=1",
    "-DFAV2_ON=1",
]
hip-flags = [
    "-DENABLE_CK=1",
    "-DFAV2_ON=1",
    "-fbracket-depth=1024",
    "-DCK_TILE_FMHA_FWD_FAST_EXP2=1",
    "-DCK_TILE_FLOAT_TO_BFLOAT16_DEFAULT=2",
    "-DCK_TILE_ATTENTION_LOGITS_SOFT_CAP_DEFAULT=0",
