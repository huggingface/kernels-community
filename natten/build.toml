[general]
name = "natten"
version = 1
edition = 5
license = "MIT"
upstream = "https://github.com/SHI-Labs/NATTEN"
backends = ["cuda"]

[general.hub]
repo-id = "kernels-community/natten"

[torch]
src = ["torch-ext/torch_binding.cpp"]
include = ["csrc/include"]

[kernel.natten]
backend = "cuda"
cuda-capabilities = [
    "7.0",
    "7.5",
    "8.0",
    "8.6",
    "8.9",
    "9.0",
    "10.0",
    "12.0",
]
cuda-flags = [
    "-O3",
    "-std=c++17",
    "--expt-relaxed-constexpr",
    "--extended-lambda",
    "--use_fast_math",
    "--ftemplate-backtrace-limit=0",
    "-Xfatbin=-compress-all",
    "-DNDEBUG",
    "-DNATTEN_WITH_CUTLASS",
    "-DCUTLASS_ENABLE_TENSOR_CORE_MMA=1",
]
depends = [
    "torch",
    "cutlass_4_5",
]
include = [
    "csrc/include",
    "csrc/autogen/include",
]
