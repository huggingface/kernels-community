[kernel.natten_blackwell]
backend = "cuda"
cuda-minver = "12.8"
cuda-capabilities = [
    "10.0a",
]
cuda-flags = [
    "-O3",
    "-std=c++17",
    "--expt-relaxed-constexpr",
    "--extended-lambda",
    "--use_fast_math",
    "--ftemplate-backtrace-limit=0",
    "-Xfatbin=-compress-all",
    "-DNDEBUG",
    "-DNATTEN_WITH_CUTLASS",
    "-DCUTLASS_ENABLE_TENSOR_CORE_MMA=1",
    "-DNATTEN_WITH_BLACKWELL_FNA=1",
]
depends = [
    "torch",
    "cutlass_4_5",
]
include = [
