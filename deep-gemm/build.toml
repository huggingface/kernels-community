[general]
name = "deep-gemm"
version = 2
license = "MIT"
backends = ["cuda"]

[general.cuda]
minver = "12.8"

[general.hub]
repo-id = "kernels-community/deep-gemm"

[torch]
pyext = [
    "py",
    "cuh",
    "hpp",
    "h",
]
src = [
    "torch-ext/torch_binding.cpp",
    "torch-ext/torch_binding.h",
]

[kernel.deep_gemm]
backend = "cuda"
cuda-capabilities = ["9.0a"]
cuda-flags = [
    "-std=c++20",
    "-O3",
    "-DNDEBUG",
    "--expt-relaxed-constexpr",
    "--expt-extended-lambda",
    "-Wno-deprecated-declarations",
]
cuda-minver = "12.8"
depends = [
    "torch",
    "cutlass_4_0",
]
include = [
    "csrc",
    "deep_gemm/include",
]
src = [
    "csrc/impl.cu",
    "csrc/apis/attention.hpp",
    "csrc/apis/einsum.hpp",
    "csrc/apis/gemm.hpp",
    "csrc/apis/hyperconnection.hpp",
    "csrc/apis/layout.hpp",
