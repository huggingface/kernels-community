[general]
name = "activation"
version = 1
license = "Apache-2.0"
backends = [
    "cuda",
    "metal",
    "cpu",
]

[general.hub]
repo-id = "kernels-community/activation"

[torch]
src = [
    "torch-ext/torch_binding.cpp",
    "torch-ext/torch_binding.h",
]

[kernel.activation_metal]
backend = "metal"
depends = ["torch"]
src = [
    "activation_metal/activation.mm",
    "activation_metal/activation.metal",
]

[kernel.activation]
backend = "cuda"
depends = ["torch"]
src = [
    "activation/activation_kernels.cu",
    "activation/cuda_compat.h",
    "activation/dispatch_utils.h",
]

[kernel.activation_cpu]
backend = "cpu"
depends = ["torch"]
include = ["activation_cpu"]
src = [
    "activation_cpu/silu_and_mul_cpu_torch.cpp",
    "activation_cpu/silu_and_mul_cpu.cpp",
    "activation_cpu/silu_and_mul_cpu.hpp",
    "activation_cpu/cpu_features.hpp",
]

[kernel.activation_cpu_avx512]
backend = "cpu"
cxx-flags = [
    "-O3",
    "-fopenmp",
    "-mf16c",
    "-mavx512f",
    "-mavx512bf16",
    "-mavx512vl",
    "-mavx512dq",
    "-mavx512bw",
    "-DCPU_CAPABILITY_AVX512",
    "-DCPU_CAPABILITY=AVX512",
]
depends = ["torch"]
include = ["activation_cpu"]
src = [
    "activation_cpu/silu_and_mul_avx512.cpp",
    "activation_cpu/silu_and_mul_avx512.hpp",
]
