name: Sign old builds
run-name: Sign old builds

on:
  workflow_dispatch:
    inputs:
      start_kernel:
        description: "Kernel name to start from (inclusive, alphabetical order). Leave empty to start from the beginning."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  # id-token: write is needed for cosign keyless signing.
  id-token: write

jobs:
  sign-kernels:
    runs-on:
      group: aws-highmemory-32-plus-nix
    timeout-minutes: 1200 # 20h
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            max-jobs = 2
            cores = 4
            sandbox-fallback = false

      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: huggingface
        env:
          USER: runner

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Process each kernel sequentially to avoid Hub rate limits.
      - name: Sign all kernels
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          REPO_PREFIX: kernels-community
          START_KERNEL: ${{ inputs.start_kernel }}
        run: |
          KERNELS=$(find . -maxdepth 2 -name "build.toml" -exec dirname {} \; | sed 's|^\./||' | sort)
          SKIP="$START_KERNEL"

          for kernel in $KERNELS; do
            # Skip kernels that sort before start_kernel.
            if [ -n "$SKIP" ]; then
              if [ "$kernel" = "$START_KERNEL" ]; then
                SKIP=""
              else
                echo "Skipping $kernel (before start_kernel)"
                continue
              fi
            fi

            echo "::group::$kernel"

            # Determine the version branch from build.toml (e.g. version = 1 -> v1).
            VERSION=$(grep -E '^\s*version\s*=' "$kernel/build.toml" | grep -oE '[0-9]+')
            VERSION_BRANCH="v${VERSION}"

            # Resolve the Hub repo-id from build.toml. Kernels whose repo-id is
            # outside kernels-community live in their own org (e.g. MiniMaxAI/msa),
            # so download from and upload to that repo (uploads open a PR).
            REPO_ID=$(grep -E '^\s*repo-id\s*=' "$kernel/build.toml" | head -1 | sed -E 's/.*=[[:space:]]*"([^"]+)".*/\1/')
            if [ -z "$REPO_ID" ]; then
              REPO_ID="$REPO_PREFIX/$kernel"
            fi

            # Download existing kernel artifacts from the version branch.
            ( cd "$kernel" && uvx --with huggingface_hub python3 -c "from huggingface_hub import snapshot_download; snapshot_download('$REPO_ID', repo_type='kernel', local_dir='.', revision='$VERSION_BRANCH')" )

            # Remove build variants that are not suitable for hashing:
            # - no __init__.py (not a Python kernel build)
            # - no metadata.json or metadata.json missing the 'name' field
            # kernel-builder hash uses metadata.json existence as its criterion,
            # so variants without __init__.py must also be removed rather than skipped.
            for variant_dir in "$kernel"/build/*/; do
              [ -d "$variant_dir" ] || continue
              if [ ! -f "${variant_dir}__init__.py" ] || \
                 [ ! -f "${variant_dir}metadata.json" ] || \
                 ! nix run nixpkgs#jq -- -e '.name' "${variant_dir}metadata.json" > /dev/null 2>&1; then
                echo "Removing variant ${variant_dir} (not suitable for signing)"
                rm -rf "${variant_dir}"
              fi
            done

            # Add digest to metadata.json files.
            ( cd "$kernel" && nix run -L github:huggingface/kernels#kernel-builder -- hash )

            # Sign metadata.json for each variant.
            for metadata_file in "$kernel"/build/*/metadata.json; do
              [ -f "$metadata_file" ] || continue
              cosign sign-blob "$metadata_file" --bundle "${metadata_file}.sigstore" --yes
            done


            # Make it get the right card.
            nix run -L github:huggingface/kernels#kernel-builder -- \
              fill-card "$kernel" "$kernel"/build/CARD.md

            # Upload signed artifacts back to the Hub (kernel repo type). For
            # external-org kernels this opens a pull request (--create-pr,
            # handled inside upload_and_report.py); there is no PR to comment on
            # here, so no --comment-pr-number is passed.
            python3 .github/scripts/upload_and_report.py \
              --kernel "$kernel" \
              --repo-prefix "$REPO_PREFIX" \
              --branch "$VERSION_BRANCH" \
              --builder "nix run -L github:huggingface/kernels#kernel-builder -- upload"

            # v1 kernels without an explicit branch in build.toml also get uploaded to main.
            BRANCH=$(grep -E '^\s*branch\s*=' "$kernel/build.toml" || true)
            if [ "$VERSION" = "1" ] && [ -z "$BRANCH" ]; then
              python3 .github/scripts/upload_and_report.py \
                --kernel "$kernel" \
                --repo-prefix "$REPO_PREFIX" \
                --branch main \
                --builder "nix run -L github:huggingface/kernels#kernel-builder -- upload"
            fi

            # Clean up to reclaim disk space before the next kernel.
            rm -rf "$kernel/build"

            echo "::endgroup::"
          done
