name: PR Comment Build Bot

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  actions: write
  issues: write
  pull-requests: write

jobs:
  handle-comment:
    if: ${{ github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
      - name: Validate comment command
        id: validate
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Extract first line and validate it's a known command
          FIRST_LINE=$(echo "$COMMENT_BODY" | head -n 1 | tr -d '\r')
          
          # Allowlist of valid commands
          case "$FIRST_LINE" in
            "/kernel-bot build"|"/kernel-bot test"|"/kernel-bot check")
              echo "valid=true" >> $GITHUB_OUTPUT
              echo "command=${FIRST_LINE}" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "valid=false" >> $GITHUB_OUTPUT
              ;;
          esac
      - name: Handle /kernel-bot command
        if: steps.validate.outputs.valid == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_ID: ${{ github.event.comment.id }}
          COMMENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_SENDER_TYPE: ${{ github.event.sender.type }}
          COMMENT_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          VALIDATED_COMMAND: ${{ steps.validate.outputs.command }}
        run: python3 .github/scripts/pr_comment_kernel_bot.py