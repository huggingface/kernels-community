name: Build
run-name: >-
  Build / ${{ inputs.kernel_name || '' }} / mode=${{ inputs.mode || 'release' }} / request=${{ inputs.dispatch_key || '' }}
on:
  workflow_dispatch:
    inputs:
      kernel_name:
        description: "Kernel directory name to build"
        required: true
        type: string
      dispatch_key:
        description: "Unique key for matching this run back to a bot dispatch"
        required: false
        type: string
      mode:
        description: "Build mode: pr (CI only) or release (build + upload)"
        required: false
        type: string
        default: "release"
      skip_build:
        description: "Skip build and upload steps (for testing workflow plumbing)"
        required: false
        type: boolean
        default: false
      pr_number:
        description: "Optional PR number to checkout before building"
        required: false
        type: string
        default: ""
      target_branch:
        description: "Target branch for upload (default: repo default)"
        required: false
        type: string
        default: ""
      upload:
        description: "Whether to upload after build"
        required: false
        type: boolean
        default: true
      repo_prefix:
        description: "Hub org prefix for uploads (e.g. kernels-community, kernels-staging)"
        required: false
        type: string
        default: "kernels-community"
      backends:
        description: "Comma-separated list of backends to build (e.g. cuda,cpu,rocm)"
        required: false
        type: string
        default: ""
      head_sha:
        description: "PR head SHA for posting commit statuses (empty = no status)"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Validate inputs, resolve the kernel directory, and generate the build matrix.
  setup:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.validate.outputs.skip }}
      kernel: ${{ steps.validate.outputs.kernel }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      # Reject kernel names outside the safe charset before any step uses them.
      # Accepts e.g.: flash-attn3, rejects: $(myevilcommand).
      - name: Validate kernel name
        env:
          KERNEL: ${{ inputs.kernel_name }}
        run: |
          case "$KERNEL" in
            ''|*[!A-Za-z0-9_-]*)
              echo "Invalid kernel_name input: must match ^[A-Za-z0-9_-]+$"
              exit 1
              ;;
          esac

      # Post a running commit status so the PR shows the build is in progress.
      - name: Set running status
        if: inputs.head_sha != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ inputs.head_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATUS_CONTEXT: ${{ github.workflow }} / ${{ inputs.kernel_name }}
        run: |
          gh api "repos/$REPO/statuses/$HEAD_SHA" \
            -f state="pending" \
            -f target_url="$RUN_URL" \
            -f description="Build in progress" \
            -f context="$STATUS_CONTEXT"

      # Guard against injection via pr_number input.
      - name: Validate PR number
        if: inputs.pr_number != ''
        id: validate-pr
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          case "$PR_NUMBER" in
            ''|*[!0-9]*)
              echo "Invalid pr_number input: must be numeric"
              exit 1
              ;;
          esac

      # When building for a PR, check out the PR head; otherwise use default branch.
      - name: Checkout PR branch
        if: inputs.pr_number != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/pull/${{ inputs.pr_number }}/head
          fetch-depth: 0
      - name: Checkout default branch
        if: inputs.pr_number == ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Nix toolchain + binary cache setup.
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            max-jobs = 2
            cores = 4
            sandbox-fallback = false
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: huggingface
        env:
          USER: runner

      # Ensure the kernel directory exists and has the required config files.
      - name: Validate kernel directory
        id: validate
        env:
          KERNEL: ${{ inputs.kernel_name }}
        run: |
          if [ -d "$KERNEL" ] && [ -f "$KERNEL/flake.nix" ] && [ -f "$KERNEL/build.toml" ]; then
            echo "kernel=$KERNEL" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      # PR-only: verify the kernel has a Hub repo-id before burning CI time.
      - name: Check that repo-id is present
        if: steps.validate.outputs.skip == 'false' && inputs.mode == 'pr'
        env:
          KERNEL: ${{ steps.validate.outputs.kernel }}
        run: |
          if ! cat $KERNEL/build.toml | nix run nixpkgs#dasel -- -i toml '$root.general.hub.get("repo-id")' &> /dev/null ; then
            echo "Mandatory repo-id is missing in $KERNEL/build.toml"
            exit 1
          fi

      # PR mode uses backendCi (lighter, faster); release uses backendBundle (all variants).
      - name: Generate build matrix
        if: steps.validate.outputs.skip == 'false'
        id: matrix
        env:
          KERNEL: ${{ steps.validate.outputs.kernel }}
          MODE: ${{ inputs.mode }}
        run: |
          if [ "$MODE" = "pr" ]; then
            NIX_TARGET="backendCi"
          else
            NIX_TARGET="backendBundle"
          fi
          X86_BACKENDS=$(cd "$KERNEL" && nix eval .#${NIX_TARGET} --apply builtins.attrNames --json --system x86_64-linux)
          ARM_BACKENDS=$(cd "$KERNEL" && nix eval .#${NIX_TARGET} --apply builtins.attrNames --json --system aarch64-linux)
          MATRIX=$(python3 .github/workflows/generate-build-matrix.py "$X86_BACKENDS" "$ARM_BACKENDS")
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  # Compile the kernel for each (backend, arch) pair; release mode also uploads to the Hub.
  build-kernel:
    needs: setup
    if: needs.setup.outputs.skip == 'false' && inputs.skip_build != true
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on:
      group: ${{ matrix.runner }}
    # PR builds get 10h; release builds get 20h (more variants to compile).
    timeout-minutes: ${{ inputs.mode == 'pr' && 600 || 1200 }}
    # id-token: write is needed for cosign.
    permissions:
      contents: read
      statuses: write
      id-token: write
    steps:
      # When building for a PR, check out the PR head; otherwise use default branch.
      - name: Checkout PR branch
        if: inputs.pr_number != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/pull/${{ inputs.pr_number }}/head
          fetch-depth: 0
      - name: Checkout default branch
        if: inputs.pr_number == ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Nix toolchain + binary cache setup (uses matrix-specific concurrency limits).
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            max-jobs = ${{ matrix.max_jobs }}
            cores = ${{ matrix.cores }}
            sandbox-fallback = false
      - name: Nix info
        run: nix-shell -p nix-info --run "nix-info -m"
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: huggingface
        env:
          USER: runner

      # PR mode builds backendCi (single representative variant);
      # release mode builds backendBundle (full set of variants).
      - name: Build kernel
        env:
          KERNEL: ${{ needs.setup.outputs.kernel }}
          MODE: ${{ inputs.mode }}
          BACKEND: ${{ matrix.backend }}
        run: |
          if [ "$MODE" = "pr" ]; then
            ( cd "$KERNEL" && nix build -L ".#backendCi.$BACKEND" && ls -l result/ )
          else
            ( cd "$KERNEL" && nix build -L ".#backendBundle.$BACKEND" && ls -l result/ )
          fi
          ( cd "$KERNEL" && cp -rL result build && rm result && chmod -R u+w build )

      - name: Install Cosign
        if: inputs.mode != 'pr'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Sign metadata.json for each built variant.
      - name: Sign kernel metadata
        if: inputs.mode != 'pr'
        run: |
          KERNEL="${{ needs.setup.outputs.kernel }}"
          while IFS= read -r metadata_file; do
            cosign sign-blob "$metadata_file" --bundle "${metadata_file}.sigstore" --yes
          done < <(find "$KERNEL/build" -mindepth 2 -maxdepth 2 -name "metadata.json")

      # Upload built artifacts to both model and kernel Hub repos.
      - name: Upload kernel to Hub
        if: inputs.mode != 'pr' && inputs.upload != false
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          KERNEL: ${{ needs.setup.outputs.kernel }}
          REPO_PREFIX: ${{ inputs.repo_prefix }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          cd "$KERNEL"
          BRANCH_FLAG=""
          if [ -n "$TARGET_BRANCH" ]; then
            BRANCH_FLAG="--branch $TARGET_BRANCH"
          fi
          nix run -L github:huggingface/kernels#kernel-builder -- upload --repo-type kernel --repo-id "$REPO_PREFIX/$KERNEL" $BRANCH_FLAG

      # v1 kernels without an explicit branch override also get uploaded to main.
      - name: Upload v1 kernels to main
        if: inputs.mode != 'pr' && inputs.upload != false && inputs.target_branch == ''
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          KERNEL: ${{ needs.setup.outputs.kernel }}
          REPO_PREFIX: ${{ inputs.repo_prefix }}
        run: |
          cd "$KERNEL"

          # Check if build.toml exists, has version = 1, and does not specify a branch.
          if [ -f "build.toml" ]; then
            VERSION=$(grep -E '^\s*version\s*=\s*1\s*$' build.toml || true)
            BRANCH=$(grep -E '^\s*branch\s*=' build.toml || true)
            if [ -n "$VERSION" ] && [ -z "$BRANCH" ]; then
              nix run -L github:huggingface/kernels#kernel-builder -- upload --repo-type kernel --repo-id "$REPO_PREFIX/$KERNEL" --branch main
            fi
          fi

  # Build the ci-test derivation and export its Nix closure as an artifact
  # so the GPU test job can import it on a GPU-enabled runner.
  build-ci-test:
    needs: setup
    if: needs.setup.outputs.skip == 'false' && inputs.mode == 'pr'
    runs-on:
      group: aws-highmemory-32-plus-nix
    timeout-minutes: 600 # 10h
    outputs:
      ci-test-path: ${{ steps.export-closure.outputs.ci-test-path }}
    steps:
      # When building for a PR, check out the PR head; otherwise use default branch.
      - name: Checkout PR branch
        if: inputs.pr_number != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/pull/${{ inputs.pr_number }}/head
          fetch-depth: 0
      - name: Checkout default branch
        if: inputs.pr_number == ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Nix toolchain + binary cache setup.
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            max-jobs = 2
            cores = 12
            sandbox-fallback = false
      - name: Nix info
        run: nix-shell -p nix-info --run "nix-info -m"
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: huggingface
        env:
          USER: runner

      # Build the test binary that will run on the GPU runner.
      - name: Build ci-test
        env:
          KERNEL: ${{ needs.setup.outputs.kernel }}
        run: |
          ( cd "$KERNEL" && nix build -L .#ci-test )

      # Serialize the full Nix closure so the GPU runner can import it
      # without needing to rebuild or have access to the Nix store.
      - name: Export ci-test closure
        id: export-closure
        env:
          KERNEL: ${{ needs.setup.outputs.kernel }}
        run: |
          CI_TEST_PATH=$(readlink -f "$KERNEL/result")
          echo "ci-test-path=$CI_TEST_PATH" >> $GITHUB_OUTPUT
          nix-store --export $(nix-store -qR "$CI_TEST_PATH") | nix run nixpkgs#zstd -- -T0 > ci-test-closure.nar.zst

      # Upload the closure as a short-lived artifact for the GPU test job.
      - name: Upload ci-test closure
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-test-closure
          path: ci-test-closure.nar.zst
          retention-days: 1

  # Import the ci-test closure onto a GPU runner and execute the test suite.
  # Runs after both build-kernel and build-ci-test complete.
  test-kernel-gpu:
    needs: [setup, build-kernel, build-ci-test]
    if: needs.setup.outputs.skip == 'false' && inputs.mode == 'pr'
    runs-on:
      group: aws-g6-12xlarge-plus
    steps:
      # Nix toolchain + binary cache setup (needed to import the closure).
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            max-jobs = 2
            cores = 12
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: huggingface
        env:
          USER: runner

      # Symlink host CUDA driver into the Nix-expected location.
      - name: Setup Nix driver location
        run: |
          sudo mkdir -p /run/opengl-driver/lib
          sudo find /usr/lib64 \
            -name 'libcuda.so*' \
            -exec ln -s {} /run/opengl-driver/lib/ \;
          find /run/opengl-driver

      # Retrieve the ci-test closure built in the previous job.
      - name: Download ci-test closure
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ci-test-closure

      # Decompress and import the closure into the local Nix store.
      - name: Import ci-test closure
        run: |
          nix run nixpkgs#zstd -- -d ci-test-closure.nar.zst -c | nix-store --import

      # Run the kernel's test suite on a real GPU.
      - name: Run GPU tests
        run: |
          CI_TEST_PATH="${{ needs.build-ci-test.outputs.ci-test-path }}"
          "$CI_TEST_PATH/bin/ci-test"

  # Report the final build/test outcome as a commit status on the PR head SHA.
  report-status:
    if: always() && inputs.head_sha != ''
    needs: [build-kernel, test-kernel-gpu]
    runs-on: ubuntu-latest
    steps:
      - name: Set commit status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ inputs.head_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATUS_CONTEXT: ${{ github.workflow }} / ${{ inputs.kernel_name }}
        run: |
          BUILD="${{ needs.build-kernel.result }}"
          TEST="${{ needs.test-kernel-gpu.result }}"

          if [ "$BUILD" = "success" ] && { [ "$TEST" = "success" ] || [ "$TEST" = "skipped" ]; }; then
            STATE="success"
            DESC="Build passed"
          elif [ "$BUILD" = "failure" ] || [ "$TEST" = "failure" ]; then
            STATE="failure"
            DESC="Build failed (build: ${BUILD}, test: ${TEST})"
          else
            STATE="error"
            DESC="Build did not complete (build: ${BUILD}, test: ${TEST})"
          fi

          gh api "repos/$REPO/statuses/$HEAD_SHA" \
            -f state="$STATE" \
            -f target_url="$RUN_URL" \
            -f description="$DESC" \
            -f context="$STATUS_CONTEXT"
