name: Build (macOS)
run-name: >-
  Build (macOS) / ${{ inputs.kernel_name || '' }} / mode=${{ inputs.mode || 'release' }} / request=${{ inputs.dispatch_key || '' }}
on:
  workflow_dispatch:
    inputs:
      kernel_name:
        description: "Kernel directory name to build"
        required: true
        type: string
      dispatch_key:
        description: "Unique key for matching this run back to a bot dispatch"
        required: false
        type: string
      mode:
        description: "Build mode: pr (CI only) or release (build + upload)"
        required: false
        type: string
        default: "release"
      skip_build:
        description: "Skip build and upload steps (for testing workflow plumbing)"
        required: false
        type: boolean
        default: false
      pr_number:
        description: "Optional PR number to checkout before building"
        required: false
        type: string
        default: ""
      target_branch:
        description: "Target branch for upload (default: repo default)"
        required: false
        type: string
        default: ""
      upload:
        description: "Whether to upload after build"
        required: false
        type: boolean
        default: true
      repo_prefix:
        description: "Hub org prefix for uploads (e.g. kernels-community, kernels-staging)"
        required: false
        type: string
        default: "kernels-community"
      backends:
        description: "Comma-separated list of backends to build (e.g. metal)"
        required: false
        type: string
        default: ""
      head_sha:
        description: "PR head SHA for posting commit statuses (empty = no status)"
        required: false
        type: string
        default: ""
      bot_comment_id:
        description: "Issue comment ID to update with Hub upload links"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  statuses: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Build the Metal kernel; PR mode builds .#ci, release builds the full bundle and uploads.
  build-kernel:
    runs-on: macos-26
    strategy:
      fail-fast: false
    steps:
      # Reject kernel names outside the safe charset before any step uses them.
      # Accepts e.g.: flash-attn3, rejects: $(myevilcommand).
      - name: Validate kernel name
        env:
          KERNEL: ${{ inputs.kernel_name }}
        run: |
          case "$KERNEL" in
            ''|*[!A-Za-z0-9_-]*)
              echo "Invalid kernel_name input: must match ^[A-Za-z0-9_-]+$"
              exit 1
              ;;
          esac

      # Post a running commit status so the PR shows the build is in progress.
      - name: Set running status
        if: inputs.head_sha != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ inputs.head_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATUS_CONTEXT: ${{ github.workflow }} / ${{ inputs.kernel_name }}
        run: |
          gh api "repos/$REPO/statuses/$HEAD_SHA" \
            -f state="pending" \
            -f target_url="$RUN_URL" \
            -f description="Build in progress" \
            -f context="$STATUS_CONTEXT"

      # Guard against injection via pr_number input.
      - name: Validate PR number
        if: inputs.pr_number != ''
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          case "$PR_NUMBER" in
            ''|*[!0-9]*)
              echo "Invalid pr_number input: must be numeric"
              exit 1
              ;;
          esac

      # When building for a PR, check out the PR head; otherwise use default branch.
      - name: Checkout PR branch
        if: inputs.pr_number != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/pull/${{ inputs.pr_number }}/head
          fetch-depth: 0
      - name: Checkout default branch
        if: inputs.pr_number == ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Nix toolchain + binary cache setup.
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            max-jobs = 1
            cores = 3
            sandbox = relaxed
      - name: Nix info
        run: nix-shell -p nix-info --run "nix-info -m"
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: huggingface
        env:
          USER: runner

      # Ensure the kernel directory exists and has the required config files.
      - name: Validate kernel directory
        id: validate
        env:
          KERNEL: ${{ inputs.kernel_name }}
        run: |
          if [ -d "$KERNEL" ] && [ -f "$KERNEL/flake.nix" ] && [ -f "$KERNEL/build.toml" ]; then
            echo "kernel=$KERNEL" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      # PR-only: verify the kernel has a Hub repo-id before burning CI time.
      - name: Check that repo-id is present
        if: steps.validate.outputs.skip == 'false' && inputs.mode == 'pr'
        env:
          KERNEL: ${{ steps.validate.outputs.kernel }}
        run: |
          if ! cat $KERNEL/build.toml | nix run nixpkgs#dasel -- -i toml '$root.general.hub.get("repo-id")' &> /dev/null ; then
            echo "Mandatory repo-id is missing in $KERNEL/build.toml"
            exit 1
          fi

      # Metal toolchain is required for macOS GPU kernel compilation.
      - name: Install Metal toolchain
        if: steps.validate.outputs.skip == 'false' && inputs.skip_build != true
        run: xcodebuild -downloadComponent MetalToolchain

      # PR mode builds the CI target (.#ci); release builds the full bundle.
      - name: Build kernel
        if: steps.validate.outputs.skip == 'false' && inputs.skip_build != true
        env:
          KERNEL: ${{ steps.validate.outputs.kernel }}
          MODE: ${{ inputs.mode }}
        run: |
          if [ "$MODE" = "pr" ]; then
            ( cd "$KERNEL" && nix build -L .#ci && ls -l result/ )
          else
            ( cd "$KERNEL" && nix build -L )
          fi
          cd "$KERNEL"
          cp -rL result build
          rm result
          chmod -R u+w build

      - name: Install Cosign
        if: steps.validate.outputs.skip == 'false' && inputs.skip_build != true && inputs.mode != 'pr'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Sign metadata.json for each built variant.
      - name: Sign kernel metadata
        if: steps.validate.outputs.skip == 'false' && inputs.skip_build != true && inputs.mode != 'pr'
        env:
          KERNEL: ${{ steps.validate.outputs.kernel }}
        run: |
          while IFS= read -r metadata_file; do
            cosign sign-blob "$metadata_file" --bundle "${metadata_file}.sigstore" --yes
          done < <(find "$KERNEL/build" -mindepth 2 -maxdepth 2 -name "metadata.json")

      # Upload built artifacts to both model and kernel Hub repos.
      - name: Upload kernel to Hub
        if: steps.validate.outputs.skip == 'false' && inputs.skip_build != true && inputs.mode != 'pr' && inputs.upload != false
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          KERNEL: ${{ steps.validate.outputs.kernel }}
          REPO_PREFIX: ${{ inputs.repo_prefix }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          BRANCH_FLAG=""
          if [ -n "$TARGET_BRANCH" ]; then
            BRANCH_FLAG="--branch $TARGET_BRANCH"
          fi
          TARGET_FLAG=$(python3 .github/scripts/hub_pr_upload_args.py upload-args "$KERNEL" "$REPO_PREFIX")
          cd "$KERNEL"
          nix run -L github:huggingface/kernels#kernel-builder -- upload \
            --repo-type kernel $TARGET_FLAG $BRANCH_FLAG \
            --output-json "$RUNNER_TEMP/upload.json"

      # v1 kernels without an explicit branch override also get uploaded to main.
      - name: Upload v1 kernels to main
        if: steps.validate.outputs.skip == 'false' && inputs.skip_build != true && inputs.mode != 'pr' && inputs.upload != false && inputs.target_branch == ''
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          KERNEL: ${{ steps.validate.outputs.kernel }}
          REPO_PREFIX: ${{ inputs.repo_prefix }}
        run: |
          TARGET_FLAG=$(python3 .github/scripts/hub_pr_upload_args.py upload-args "$KERNEL" "$REPO_PREFIX")
          cd "$KERNEL"

          if [ -f "build.toml" ]; then
            VERSION=$(grep -E '^\s*version\s*=\s*1\s*$' build.toml || true)
            BRANCH=$(grep -E '^\s*branch\s*=' build.toml || true)
            if [ -n "$VERSION" ] && [ -z "$BRANCH" ]; then
              nix run -L github:huggingface/kernels#kernel-builder -- upload \
                --repo-type kernel $TARGET_FLAG --branch main \
                --output-json "$RUNNER_TEMP/upload-main.json"
            fi
          fi

      - name: Upload Hub upload summary
        if: steps.validate.outputs.skip == 'false' && inputs.skip_build != true && inputs.mode != 'pr' && inputs.upload != false
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hub-upload-macos
          path: ${{ runner.temp }}/upload*.json
          retention-days: 1

  # Report the final build outcome as a commit status on the PR head SHA.
  report-status:
    if: always() && inputs.head_sha != ''
    needs: [build-kernel]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
      statuses: write
    env:
      REPORT_HUB_UPLOAD: ${{ needs.build-kernel.result == 'success' && inputs.bot_comment_id != '' && inputs.mode != 'pr' && inputs.upload != false }}
    steps:
      - name: Set commit status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ inputs.head_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATUS_CONTEXT: ${{ github.workflow }} / ${{ inputs.kernel_name }}
        run: |
          BUILD="${{ needs.build-kernel.result }}"

          if [ "$BUILD" = "success" ]; then
            STATE="success"
            DESC="Build passed"
          elif [ "$BUILD" = "failure" ]; then
            STATE="failure"
            DESC="Build failed"
          else
            STATE="error"
            DESC="Build did not complete (${BUILD})"
          fi

          gh api "repos/$REPO/statuses/$HEAD_SHA" \
            -f state="$STATE" \
            -f target_url="$RUN_URL" \
            -f description="$DESC" \
            -f context="$STATUS_CONTEXT"

      - name: Checkout comment helpers
        if: env.REPORT_HUB_UPLOAD == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.pr_number != '' && format('refs/pull/{0}/head', inputs.pr_number) || github.ref }}

      - name: Download Hub upload summaries
        if: env.REPORT_HUB_UPLOAD == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: hub-upload-*
          path: hub-uploads

      - name: Update bot comment with Hub URLs
        if: env.REPORT_HUB_UPLOAD == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOT_COMMENT_ID: ${{ inputs.bot_comment_id }}
          KERNEL: ${{ inputs.kernel_name }}
          REPO_PREFIX: ${{ inputs.repo_prefix }}
        run: |
          BODY=$(gh api "repos/$GITHUB_REPOSITORY/issues/comments/$BOT_COMMENT_ID" --jq .body)
          BODY=$(python3 .github/scripts/format_hub_upload_comment.py --base "$BODY" "$KERNEL" "$REPO_PREFIX" hub-uploads/**/*.json)
          gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$BOT_COMMENT_ID" -f body="$BODY"
