name: "Check PR author is vouched"
on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    name: Check PR author
    runs-on: ubuntu-latest
    steps:
      - name: Check if reopened by a maintainer
        id: maintainer
        if: github.event.action == 'reopened'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
        run: |
          PERMISSION=$(gh api "repos/$REPO/collaborators/$ACTOR/permission" --jq '.permission' 2>/dev/null || echo "none")
          echo "Actor $ACTOR has permission: $PERMISSION"
          if [[ "$PERMISSION" == "admin" || "$PERMISSION" == "maintain" || "$PERMISSION" == "write" ]]; then
            echo "is_maintainer=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_maintainer=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Vouch check
        if: github.event.action == 'opened' || steps.maintainer.outputs.is_maintainer != 'true'
        uses: mitchellh/vouch/action/check-pr@d66fa29a64600490892131ad87597c30c91fcac4 # v1.5.0
        with:
          pr-number: ${{ github.event.pull_request.number }}
          auto-close: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
