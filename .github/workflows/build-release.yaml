name: Build Release
run-name: >-
  Build Release / ${{ inputs.kernel_name || '' }} / request=${{ inputs.dispatch_key || '' }}
on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      kernel_name:
        description: "Kernel directory name to build"
        required: true
        type: string
      dispatch_key:
        description: "Unique key for matching this run back to a bot dispatch"
        required: false
        type: string
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  setup:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.validate.outputs.skip }}
      kernel: ${{ steps.validate.outputs.kernel }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            max-jobs = 2
            cores = 4
            sandbox-fallback = false
      - uses: cachix/cachix-action@v16
        with:
          name: huggingface
        env:
          USER: runner
      - name: Validate kernel directory
        id: validate
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            KERNEL="${{ inputs.kernel_name }}"
            if [ -d "$KERNEL" ] && [ -f "$KERNEL/flake.nix" ] && [ -f "$KERNEL/build.toml" ]; then
              echo "kernel=$KERNEL" >> $GITHUB_OUTPUT
              echo "skip=false" >> $GITHUB_OUTPUT
            else
              echo "skip=true" >> $GITHUB_OUTPUT
            fi
          else
            if KERNEL=$(python3 .github/workflows/validate-kernel-pr.py "release"); then
              echo "kernel=$KERNEL" >> $GITHUB_OUTPUT
              echo "skip=false" >> $GITHUB_OUTPUT
            else
              echo "skip=true" >> $GITHUB_OUTPUT
            fi
          fi
      - name: Generate build matrix
        if: steps.validate.outputs.skip == 'false'
        id: matrix
        env:
          KERNEL: ${{ steps.validate.outputs.kernel }}
        run: |
          KERNEL="${{ steps.validate.outputs.kernel }}"
          X86_BACKENDS=$(cd "$KERNEL" && nix eval .#backendBundle --apply builtins.attrNames --json --system x86_64-linux)
          ARM_BACKENDS=$(cd "$KERNEL" && nix eval .#backendBundle --apply builtins.attrNames --json --system aarch64-linux)
          MATRIX=$(python3 .github/workflows/generate-build-matrix.py "$X86_BACKENDS" "$ARM_BACKENDS")
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build-kernel:
    needs: setup
    if: needs.setup.outputs.skip == 'false'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on:
      group: ${{ matrix.runner }}
    timeout-minutes: 1200 # 20h
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            max-jobs = ${{ matrix.max_jobs }}
            cores = ${{ matrix.cores }}
            sandbox-fallback = false
      - name: Nix info
        run: nix-shell -p nix-info --run "nix-info -m"
      - uses: cachix/cachix-action@v16
        with:
          name: huggingface
        env:
          USER: runner
      - name: Build kernel
        run: |
          KERNEL="${{ needs.setup.outputs.kernel }}"
          ( cd "$KERNEL" && nix build -L .#backendBundle.${{ matrix.backend }} && ls -l result/ )
      - name: Upload kernel to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          KERNEL="${{ needs.setup.outputs.kernel }}"
          cd "$KERNEL"
          nix run -L github:huggingface/kernels#kernel-builder -- upload --repo-type model --repo-id "kernels-community/$KERNEL"
          nix run -L github:huggingface/kernels#kernel-builder -- upload --repo-type kernel --repo-id "kernels-community/$KERNEL"
      - name: Upload v1 kernels to main
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          KERNEL="${{ needs.setup.outputs.kernel }}"
          cd "$KERNEL"

          # Check if build.toml exists, has version = 1, and does not specify a branch.
          if [ -f "build.toml" ]; then
            VERSION=$(grep -E '^\s*version\s*=\s*1\s*$' build.toml || true)
            BRANCH=$(grep -E '^\s*branch\s*=' build.toml || true)
            if [ -n "$VERSION" ] && [ -z "$BRANCH" ]; then
              nix run -L github:huggingface/kernels#kernel-builder -- upload --repo-type model --repo-id "kernels-community/$KERNEL" --branch main
              nix run -L github:huggingface/kernels#kernel-builder -- upload --repo-type kernel --repo-id "kernels-community/$KERNEL" --branch main
            fi
          fi
