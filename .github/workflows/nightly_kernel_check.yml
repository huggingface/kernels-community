name: Scheduled Kernels Check

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  kernels-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/huggingface/kernels kernel-abi-check

      - name: Run kernels checks and report failures
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python scripts/report_kernel_failures.py --verbose --clear-cache
