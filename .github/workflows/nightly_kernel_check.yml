name: Scheduled Kernels Check

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  kernels-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "git+https://github.com/huggingface/kernels#subdirectory=kernels"

      - name: Install kernel-builder
        # ABI checks now live in `kernel-builder check-abi`; install the binary
        # from the kernels repository so it is available on PATH.
        run: cargo install --git https://github.com/huggingface/kernels hf-kernel-builder

      - name: Run kernels checks and report failures
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python scripts/report_kernel_failures.py --verbose --clear-cache
